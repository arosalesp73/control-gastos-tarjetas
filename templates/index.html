<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { color: #bb86fc; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        input, select { background: #2c2c2c; color: white; border: 1px solid #333; }
        button { background: #03dac6; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #018786; }
        .logout { margin-top: 20px; color: #cf6679; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Registrar Movimiento</h2>
        <form action="/guardar" method="post">
            <label>Fecha</label>
            <input type="date" name="fecha" id="fecha_input" required>

            <label>Establecimiento / Tienda</label>
            <input type="text" name="tienda" placeholder="Ej. Walmart, Gasolinera" required>

            <label>Monto</label>
            <input type="number" step="0.01" name="monto" placeholder="0.00" required>

            <label>Tarjeta</label>
            <!-- Por ahora es texto, luego será un menú desplegable dinámico -->
            <select name="tarjeta" class="form-control" required>
                <option value="" disabled selected>Selecciona una tarjeta</option>
                <option value="BBVA Perla">BBVA Perla</option>
                <option value="Nu">Nu</option>
                <option value="Mercado Pago">Mercado Pago</option>
                <option value="Efectivo">Efectivo</option>
            </select>
            <button type="submit">Guardar Movimiento</button>
        </form>
    </div>

    <a href="/logout" class="logout">Cerrar Sesión</a>

    <script>
    // 1. Obtener la fecha actual ajustada a tu zona horaria (Colima)
    const hoyLocal = new Date();
    const offset = hoyLocal.getTimezoneOffset() * 60000;
    const fechaAjustada = new Date(hoyLocal - offset).toISOString().split("T")[0];

    // 2. Localizar el calendario por su ID
    const inputFecha = document.getElementById('fecha_input');
    
    // 3. Aplicar las restricciones
    if (inputFecha) {
        inputFecha.value = fechaAjustada; // Pone la fecha de hoy automáticamente
        inputFecha.max = fechaAjustada;   // Bloquea cualquier día a partir de mañana
    }
</script>
</body>
</html>
