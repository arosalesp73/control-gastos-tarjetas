<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos</title>
    <style>
        {{ css | safe }}
        .nav-bar { display: flex; gap: 20px; margin-bottom: 30px; padding: 15px; border-bottom: 1px solid #333; align-items: center; }
        .nav-link { color: #e0e0f0; text-decoration: none; font-weight: 500; }
        .nav-link:hover { color: #6c63ff; }
        .admin-tag { background: #6c63ff; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-left: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .btn-plus { display: flex; align-items: center; justify-content: center; text-decoration: none; border: 2px dashed #444; background: transparent; color: #666; font-size: 2em; }
        .form-group { margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: white; margin-top: 8px; box-sizing: border-box; }
        button { background: #6c63ff; cursor: pointer; font-weight: bold; border: none; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-link">🏠 Inicio</a>
        <a href="/reportes" class="nav-link">📊 Reportes Excel</a>
        {% if user.role == 'admin' %}
        <a href="/admin/usuarios" class="nav-link" style="color: #a0a0ff;">👥 Usuarios</a>
        {% endif %}
        <div style="margin-left: auto; display: flex; align-items: center;">
            <span>{{ user.username }}</span>
            {% if user.role == 'admin' %}<span class="admin-tag">Admin</span>{% endif %}
            <a href="/logout" style="color: #ff4e4e; text-decoration: none; margin-left: 20px;">Salir</a>
        </div>
    </nav>

    <h2>Mis Tarjetas</h2>
    <div class="grid-container">
        {% for t in tarjetas %}
        <div class="card">
            <h3 style="margin:0; color: #bbb;">{{ t.nombre_tarjeta }}</h3>
            <p style="color: #666; margin-top: 10px;">Estado: Activa</p>
        </div>
        {% endfor %}
        
        <a href="/tarjetas/nueva" class="card btn-plus">
            <span>+</span>
        </a>
    </div>

    <div style="max-width: 500px;">
        <h2>Registrar Gasto</h2>
        <div class="card">
            <form action="/agregar" method="post">
                <div class="form-group">
                    <label>Concepto:</label>
                    <input type="text" name="concepto" required>
                </div>
                <div class="form-group">
                    <label>Monto:</label>
                    <input type="number" name="monto" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Tarjeta:</label>
                    <select name="tarjeta_id">
                        {% for t in tarjetas %}
                        <option value="{{ t.nombre_tarjeta }}">{{ t.nombre_tarjeta }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit">Guardar Movimiento</button>
            </form>
        </div>
    </div>
</body>
</html>
