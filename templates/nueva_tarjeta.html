<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Tarjeta</title>
    <style>
        {{ css | safe }}
        .container { max-width: 400px; margin: 50px auto; padding: 20px; }
        .card { background: var(--surface); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9em; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0f0f1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #6c63ff; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 style="margin-top:0">💳 Nueva Tarjeta</h2>
            <form action="/tarjetas/guardar" method="post">
                <div class="form-group">
                    <label>Nombre de la Tarjeta:</label>
                    <input type="text" name="nombre_tarjeta" placeholder="Ej: DiDi, Nubank, Banamex" required>
                </div>

                <div class="form-group">
                    <label>Día de Corte (1-31):</label>
                    <input type="number" name="dia_corte" min="1" max="31" placeholder="Ej: 15" required>
                </div>

                <div class="form-group">
                    <label>Día Límite de Pago (1-31):</label>
                    <input type="number" name="dia_pago" min="1" max="31" placeholder="Ej: 5" required>
                </div>

                <button type="submit">Guardar Tarjeta</button>
            </form>
            <a href="/" class="btn-cancel">Cancelar</a>
        </div>
    </div>
</body>
</html>
