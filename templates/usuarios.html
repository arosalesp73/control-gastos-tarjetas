<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
    <style>{{ css | safe }}</style>
</head>
<body>
    <nav style="padding: 15px; background: var(--surface); border-bottom: 1px solid #333;">
        <a href="/" style="color: var(--accent); text-decoration: none; font-weight: bold;">← Volver</a>
    </nav>

    <div style="padding: 20px;">
        <div class="card" style="margin-bottom: 30px;">
            <h3 style="margin-top: 0;">➕ Crear Nuevo Usuario</h3>
            <form action="/admin/crear_usuario" method="post" style="display: grid; gap: 10px;">
                <input name="nuevo_username" placeholder="Usuario" required>
                <input name="nuevo_password" type="password" placeholder="Contraseña" required>
                <select name="nuevo_role">
                    <option value="user">Usuario Estándar</option>
                    <option value="admin">Administrador</option>
                </select>
                <button type="submit">Registrar Usuario</button>
            </form>
        </div>

        <h3>Usuarios Existentes</h3>
        <div style="display: grid; gap: 15px;">
            {% for u in lista_usuarios %}
            <div class="card" style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong style="font-size: 1.1em;">{{ u.username }}</strong><br>
                    <span style="color: #888; font-size: 0.8em;">Rol: {{ u.role }}</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <a href="/admin/usuarios/editar/{{ u.id }}" style="text-decoration: none;">✏️</a>
                    <a href="/admin/usuarios/eliminar/{{ u.id }}" 
                       onclick="return confirm('¿Estás seguro? Se borrarán también todas sus tarjetas y movimientos.')"
                       style="text-decoration: none;">🗑️</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
