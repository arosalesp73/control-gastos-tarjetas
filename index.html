<!-- Estructura Principal -->
<div class="app-container">
    <div class="card">
        <h3>Nuevo Registro</h3>
        
        <!-- Prioridad 1: Selector de tipo -->
        <div class="selector-container">
            <input type="radio" id="gasto" name="tipo_mov" value="compra" checked>
            <label for="gasto" class="opcion gasto">🛍️ Compra</label>
            
            <input type="radio" id="abono" name="tipo_mov" value="abono">
            <label for="abono" class="opcion abono">💰 Abono</label>
        </div>

        <!-- Inputs del formulario -->
        <div class="inputs-group">
            <input type="text" id="tarjeta" placeholder="Nombre de la Tarjeta">
            <input type="number" id="monto" placeholder="Monto $">
            <input type="text" id="concepto" placeholder="Concepto">
            <button id="btnGuardar" onclick="enviarDatos()">Guardar Movimiento</button>
        </div>
    </div>
</div>

<script>
async function enviarDatos() {
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;

    // Captura de valores
    const tipoSeleccionado = document.querySelector('input[name="tipo_mov"]:checked').value;
    let montoValor = parseFloat(document.getElementById('monto').value);
    const tarjetaNombre = document.getElementById('tarjeta').value;
    const conceptoTexto = document.getElementById('concepto').value;

    // Lógica Contable: Si es abono, guardamos el número como negativo para el balance final
    const montoProcesado = (tipoSeleccionado === 'abono') ? (Math.abs(montoValor) * -1) : Math.abs(montoValor);

    // Inserción en Supabase (Asegúrate de que la variable _supabase esté configurada)
    const { data, error } = await _supabase
        .from('movimientos') 
        .insert([
            { 
                tarjeta: tarjetaNombre, 
                monto: montoProcesado, 
                concepto: conceptoTexto, 
                tipo: tipoSeleccionado,
                fecha: new Date().toISOString().split('T')[0]
            }
        ]);

    if (error) {
        alert("Error al guardar: " + error.message);
    } else {
        alert("✅ Registrado correctamente");
        location.reload(); 
    }
    btn.disabled = false;
}
</script>

}

    display: flex; gap: 10px; margin-bottom: 25px;
}

    flex: 1; padding: 15px; text-align: center;
    border: 2px solid #ddd; border-radius: 10px;

}

input[type="radio"]:checked + .opcion.abono { border-color: #388e3c; color: #388e3c; background: #e8f5e9; }
